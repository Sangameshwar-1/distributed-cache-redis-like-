name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build CacheX
      run: cmake . && make

    - name: Run Unit Tests
      run: ./test_cache

    - name: Run Benchmark
      run: ./benchmark

  sanitizer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build with AddressSanitizer
      run: cmake -DASAN=ON . && make

    - name: Run Tests with ASAN
      run: ./test_cache
